services:
  postgres:
    image: postgres:18-alpine
    container_name: notification_db
    ports:
      - "6005:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notification_network

networks:
  notification_network:
    driver: bridge

volumes:
  postgres_data:
